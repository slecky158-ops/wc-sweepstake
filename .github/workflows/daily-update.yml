name: Daily Sweepstake Update

on:
  schedule:
    # 06:55 UTC = 07:55 UK during BST (Mar-Oct). Tournament is entirely within BST,
    # so this stays as-is until November.
    - cron: '55 6 * * *'
  workflow_dispatch: # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet openai

      - name: Run daily update
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: python .github/scripts/daily-update.py

      - name: Commit and push if changed
        run: |
          git config user.email "actions@github.com"
          git config user.name "WC Daily Bot"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "daily update $(TZ=Europe/London date +%Y-%m-%d)"
            git push
          else
            echo "No changes to commit."
          fi
